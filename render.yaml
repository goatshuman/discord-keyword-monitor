services:
- type: web
  name: discord-keyword-monitor
  runtime: python
  pythonVersion: 3.11.0
  buildCommand: pip install -r requirements.txt
  startCommand: python main.py
  envVars:
  - key: PYTHON_VERSION
    value: 3.11.0
  - key: DISCORD_BOT_TOKEN
    sync: false
  - key: DISCORD_USER_TOKEN
    sync: false
  - key: DISCORD_USER_ID
    sync: false
  - key: MONITOR_CHANNELS
    sync: false
