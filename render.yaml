services:
    - type: web
      name: discord-keyword-monitor
      runtime: python
      buildCommand: pip install -r requirements.txt
      startCommand: python main.py
      envVars:
        - key: DISCORD_BOT_TOKEN
          sync: false
        - key: DISCORD_USER_TOKEN
          sync: false
        - key: DISCORD_USER_ID
          sync: false
        - key: MONITOR_CHANNELS
          sync: false
  